name: Browser matrix

on:
  schedule:
    - cron: "17 3 * * *"
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: browser-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: full E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps "${{ matrix.browser }}"

      - name: Test all production journeys
        run: npx playwright test --project="${{ matrix.browser }}"

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.browser }}-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
