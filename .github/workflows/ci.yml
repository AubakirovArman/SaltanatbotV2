name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Source architecture budgets
        run: npm run architecture:check

      - name: Lint (Biome)
        run: npm run lint

      - name: Documentation links and commands
        run: npm run docs:check

      - name: Test (Vitest)
        run: npm test

      - name: Build (backend + frontend)
        run: npm run build

      - name: Frontend bundle budgets
        run: npm run perf:check

  postgres-security:
    name: PostgreSQL security integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-admin-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ALLOW_DESTRUCTIVE_POSTGRES_TESTS: "1"
      JOBS_TEST_DATABASE_URL: postgresql://saltanatbotv2_test:ci-test-password@127.0.0.1:5432/saltanatbotv2_ci_test
      EXECUTION_LEDGER_TEST_DATABASE_URL: postgresql://saltanatbotv2_test:ci-test-password@127.0.0.1:5432/saltanatbotv2_ci_test
      WORKSPACES_TEST_DATABASE_URL: postgresql://saltanatbotv2_test:ci-test-password@127.0.0.1:5432/saltanatbotv2_ci_test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create isolated unprivileged test database
        run: |
          node --input-type=module <<'NODE'
          import pg from "pg";
          const admin = new pg.Client({
            host: "127.0.0.1",
            port: 5432,
            database: "postgres",
            user: "postgres",
            password: "ci-admin-password"
          });
          await admin.connect();
          await admin.query(
            "CREATE ROLE saltanatbotv2_test LOGIN PASSWORD 'ci-test-password' NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT"
          );
          await admin.query("CREATE DATABASE saltanatbotv2_ci_test OWNER saltanatbotv2_test");
          await admin.end();
          NODE

      # The integration suites require an explicit destructive-test opt-in,
      # verify a test-only database and unprivileged role, apply checksum-locked
      # migrations, then exercise real queue, execution-ledger and workspace
      # tenant/concurrency invariants.
      - name: Run migrations and PostgreSQL security integration tests
        run: |
          npx --no-install vitest run backend/tests/computeJobsPostgres.integration.test.ts
          npx --no-install vitest run backend/tests/executionStepLedgerPostgres.integration.test.ts
          npx --no-install vitest run backend/tests/workspacesPostgres.integration.test.ts

  browser-e2e:
    name: end-to-end (Chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test production journeys
        run: npm run test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  firefox-smoke:
    name: critical journeys (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox
        run: npx playwright install --with-deps firefox

      - name: Test critical production journeys
        run: npm run test:e2e:firefox-smoke

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-smoke-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  visual-regression:
    name: visual regression (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compare stable interface snapshots
        run: npm run test:visual

      - name: Upload visual failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Ensure runtime secrets dir is gitignored
        run: |
          # backend/data holds the SQLite DB + AES key — it must never be committed.
          if git ls-files --error-unmatch backend/data > /dev/null 2>&1; then
            echo "::error::backend/data is tracked in git — it must be gitignored (holds secrets)."
            exit 1
          fi
          # Check a virtual child path because backend/data does not exist in a
          # clean checkout. --no-index keeps this check valid if the probe name
          # is ever present in the worktree.
          git check-ignore -q --no-index backend/data/.secret-scan-probe || {
            echo "::error::backend/data is not covered by .gitignore."
            exit 1
          }
          echo "OK: backend/data is untracked and gitignored."

      - name: Grep for obvious committed secrets
        run: |
          # Lightweight heuristic scan of tracked files for high-signal key patterns.
          # Excludes lockfiles/docs to avoid false positives on hashes/examples.
          set +e
          MATCHES=$(git grep -nIE \
            -e 'AKIA[0-9A-Z]{16}' \
            -e 'BEGIN (RSA|EC|OPENSSH|PRIVATE) KEY' \
            -e '(secret|api[_-]?key|token|password)[[:space:]]*[:=][[:space:]]*['"'"'"][A-Za-z0-9/+_-]{24,}' \
            -- ':!package-lock.json' ':!**/*.md' ':!.github/**')
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "::error::Potential committed secret(s) found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: no obvious secret patterns in tracked files."
