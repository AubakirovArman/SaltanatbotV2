# SaltanatbotV2 — self-hosted terminal plus its isolated identity database.
#
# The backend serves both the JSON/WebSocket API and the built frontend SPA.
#
# IMPORTANT: backend/data holds the SQLite trading DB AND the AES encryption key
# that protects stored exchange API keys. It MUST be a persistent named volume
# (mounted below) so it survives container recreation — and must NEVER be baked
# into the image. Losing this volume means losing the encrypted keys and bot state.

services:
  postgres:
    image: postgres:17.10-bookworm
    restart: unless-stopped
    ports:
      # Loopback-only host port. Change POSTGRES_HOST_PORT if 55434 is occupied.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55434}:5432"
    environment:
      POSTGRES_DB: ${PGDATABASE:-saltanatbotv2}
      POSTGRES_USER: ${PGUSER:-saltanatbotv2}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - saltanat-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    shm_size: 256mb
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 256

  saltanatbotv2:
    build:
      context: .
      dockerfile: Dockerfile
    image: saltanatbotv2:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # host:container — change the host side (left) to expose a different port.
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${PORT:-4180}:4180"
    environment:
      AUTH_MODE: database
      AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-1}
      AUTH_SESSION_TTL_MS: ${AUTH_SESSION_TTL_MS:-43200000}
      AUTH_WS_TICKET_TTL_MS: ${AUTH_WS_TICKET_TTL_MS:-30000}
      AUTH_TRADING_ROLES_ENABLED: ${AUTH_TRADING_ROLES_ENABLED:-1}
      AUTH_LOGIN_RATE_WINDOW_MS: ${AUTH_LOGIN_RATE_WINDOW_MS:-900000}
      AUTH_LOGIN_RATE_BLOCK_MS: ${AUTH_LOGIN_RATE_BLOCK_MS:-900000}
      AUTH_LOGIN_IP_MAX_FAILURES: ${AUTH_LOGIN_IP_MAX_FAILURES:-30}
      AUTH_LOGIN_IDENTITY_MAX_FAILURES: ${AUTH_LOGIN_IDENTITY_MAX_FAILURES:-10}
      AUTH_REGISTER_RATE_WINDOW_MS: ${AUTH_REGISTER_RATE_WINDOW_MS:-3600000}
      AUTH_REGISTER_RATE_BLOCK_MS: ${AUTH_REGISTER_RATE_BLOCK_MS:-3600000}
      AUTH_REGISTER_IP_MAX_ATTEMPTS: ${AUTH_REGISTER_IP_MAX_ATTEMPTS:-5}
      AUTH_RATE_LIMIT_MAX_ENTRIES: ${AUTH_RATE_LIMIT_MAX_ENTRIES:-4096}
      AUTH_PASSWORD_HASH_CONCURRENCY: ${AUTH_PASSWORD_HASH_CONCURRENCY:-2}
      AUTH_PASSWORD_HASH_QUEUE: ${AUTH_PASSWORD_HASH_QUEUE:-32}
      API_RATE_REFILL_PER_SECOND: ${API_RATE_REFILL_PER_SECOND:-20}
      API_RATE_BURST: ${API_RATE_BURST:-240}
      API_RATE_MAX_BUCKETS: ${API_RATE_MAX_BUCKETS:-4096}
      TRADING_LEGACY_OWNER_USER_ID: ${TRADING_LEGACY_OWNER_USER_ID:-}
      TRADING_MAX_ACCOUNTS_PER_USER: ${TRADING_MAX_ACCOUNTS_PER_USER:-8}
      TRADING_MAX_BOTS_PER_USER: ${TRADING_MAX_BOTS_PER_USER:-24}
      TRADING_MAX_RUNNING_PAPER_BOTS_PER_USER: ${TRADING_MAX_RUNNING_PAPER_BOTS_PER_USER:-4}
      TRADING_MAX_RUNNING_LIVE_BOTS_PER_USER: ${TRADING_MAX_RUNNING_LIVE_BOTS_PER_USER:-2}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-saltanatbotv2}
      PGUSER: ${PGUSER:-saltanatbotv2}
      PGPASSWORD_FILE: /run/secrets/postgres_password
      PGPOOL_MAX: ${PGPOOL_MAX:-12}
      # Port the server binds inside the container (matches the EXPOSE/mapping).
      PORT: 4180
      # HOST is fixed to 0.0.0.0 in the image so the mapped port is reachable.
      # This pre-HTTPS image is deliberately hard-pinned to Research / Paper.
      RUNTIME_PROFILE: public-http-paper
      # Comma-separated CORS allowlist for cross-origin dev/proxy setups.
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      PAPER_MULTI_LEG_DB_PATH: ${PAPER_MULTI_LEG_DB_PATH:-}
      ARBITRAGE_CONTINUOUS_ROUTES_FILE: ${ARBITRAGE_CONTINUOUS_ROUTES_FILE:-}
      ARBITRAGE_CONTINUOUS_ROUTES_JSON: ${ARBITRAGE_CONTINUOUS_ROUTES_JSON:-}
    secrets:
      - postgres_password
    volumes:
      # Persist the SQLite DB + secrets across recreations. Container path matches
      # the backend's data dir (resolved relative to backend/dist at runtime).
      - saltanat-data:/app/backend/data
      # Makes the committed/reviewable continuous-route allowlist available at
      # /app/config/continuous-routes.research.json when FILE mode is selected.
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4180/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 4g
    cpus: 4.0
    pids_limit: 512

  research-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: saltanatbotv2:latest
    command: ["node", "backend/dist/workers/researchWorker.js"]
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUNTIME_PROFILE: public-http-paper
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-saltanatbotv2}
      PGUSER: ${PGUSER:-saltanatbotv2}
      PGPASSWORD_FILE: /run/secrets/postgres_password
      PGPOOL_MAX: 4
      RESEARCH_WORKER_CONCURRENCY: ${RESEARCH_WORKER_CONCURRENCY:-2}
      RESEARCH_JOB_TIMEOUT_MS: ${RESEARCH_JOB_TIMEOUT_MS:-120000}
      RESEARCH_JOB_MEMORY_MB: ${RESEARCH_JOB_MEMORY_MB:-512}
      RESEARCH_WORKER_METRICS_INTERVAL_MS: ${RESEARCH_WORKER_METRICS_INTERVAL_MS:-30000}
      RESEARCH_JOB_RETENTION_INTERVAL_MS: ${RESEARCH_JOB_RETENTION_INTERVAL_MS:-60000}
      RESEARCH_WORKER_SHUTDOWN_TIMEOUT_MS: ${RESEARCH_WORKER_SHUTDOWN_TIMEOUT_MS:-20000}
    secrets:
      - postgres_password
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 128

volumes:
  saltanat-data:
    driver: local
  saltanat-postgres:
    driver: local

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-.secrets/postgres_password}
