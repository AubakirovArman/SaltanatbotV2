<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d10" />
    <script>
      try {
        const theme = localStorage.getItem("mf:theme") === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="color-scheme"]').content = theme;
        document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#0b0d10" : "#f2f4f7";
      } catch {}
    </script>
    <meta name="application-name" content="SaltanatbotV2" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>SaltanatbotV2</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
