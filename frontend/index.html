<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#080d13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SaltanatbotV2" />
    <script src="/theme-init.js"></script>
    <link rel="stylesheet" href="/startup-fallback.css" />
    <script src="/startup-fallback.js" defer></script>
    <meta name="application-name" content="SaltanatbotV2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>SaltanatbotV2</title>
  </head>
  <body>
    <div id="root">
      <main id="startup-recovery" class="startup-recovery startup-boot" role="status" aria-labelledby="startup-title">
        <div class="startup-recovery-card">
          <img src="/logo.svg" width="52" height="52" alt="" />
          <p class="startup-recovery-kicker">SaltanatbotV2</p>
          <h1 id="startup-title">Starting SaltanatbotV2…</h1>
          <p id="startup-help">Loading the chart, saved workspace and market connections.</p>
          <div id="startup-actions" class="startup-recovery-actions" hidden>
            <button id="startup-reload" class="primary" type="button">Reload page</button>
            <button id="startup-refresh" type="button">Refresh application files</button>
          </div>
          <p id="startup-footnote" class="startup-recovery-footnote">Refreshing removes only SaltanatbotV2 offline shell files and its service-worker registration.</p>
          <noscript><p>JavaScript is required to run the application.</p><a href="/">Reload page</a></noscript>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
